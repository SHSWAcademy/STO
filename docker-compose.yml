version: '3.8'

services:

  # ── PostgreSQL 범근님 RDS 파면 엔드포인트 여기에 다시 넣기
  postgres:
    image: postgres:16-alpine
    container_name: sto-postgres
    environment:
      POSTGRES_DB: sto
      POSTGRES_USER: sto
      POSTGRES_PASSWORD: sto1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sto"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 
  redis:
    image: redis:7-alpine
    container_name: sto-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──  Ethereum 
  # 이곳에 써주세용 ~ 

  # ── General API 컨테이너 (모든 API 처리)
  general:
    build:
      context: ./server/main
      dockerfile: Dockerfile
    container_name: sto-general
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sto
      SPRING_DATASOURCE_USERNAME: sto
      SPRING_DATASOURCE_PASSWORD: sto1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      MATCH_URL: http://match:8081
      JWT_SECRET: sto-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-ok
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: always

  # ── 스프링 매치 (주문 체결)
  match:
    build:
      context: ./server/match
      dockerfile: Dockerfile
    container_name: sto-match
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sto
      SPRING_DATASOURCE_USERNAME: sto
      SPRING_DATASOURCE_PASSWORD: sto1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JAVA_OPTS: "-Xms512m -Xmx1g"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      general:
        condition: service_healthy  
    restart: always
    deploy:
      replicas: 1  # 반드시 1개 고정 (중복 체결 방지)

  # ── Batch
  batch:
    build:
      context: ./server/batch
      dockerfile: Dockerfile
    container_name: sto-batch
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sto
      SPRING_DATASOURCE_USERNAME: sto
      SPRING_DATASOURCE_PASSWORD: sto1234
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
      general:
        condition: service_healthy
    restart: always

  # ── Nginx 
  nginx:
    image: nginx:alpine
    container_name: sto-nginx
    ports:
      - "80:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - general
    restart: always

volumes:
  postgres_data:
