
services:
#db 컨테이너
  db:
    image: postgres:18
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

#redis 컨테이너
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

#메인 컨테이너
  main:
    build: ./main
    container_name: app-main
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /srv/stone/app/files:/app/files
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BLOCKCHAIN_PRIVATE_KEY: ee8e8c36ec6bd55bd7206ca85598c52d5dac74695c45a94afc813b5e8a885a8f
      BLOCKCHAIN_RPC_URL: https://eth-sepolia.g.alchemy.com/...
      BLOCKCHAIN_CONTRACT_ADDRESS: ""
    depends_on:
      - db
      - redis

#매치 컨테이너
  match:
    build: ./match
    container_name: app-match
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BLOCKCHAIN_PRIVATE_KEY: ee8e8c36ec6bd55bd7206ca85598c52d5dac74695c45a94afc813b5e8a885a8f
      BLOCKCHAIN_RPC_URL: https://eth-sepolia.g.alchemy.com/...
      BLOCKCHAIN_CONTRACT_ADDRESS: ""
    depends_on:
      - db
      - redis

#배치 컨테이너
  batch:
    build: ./batch
    container_name: app-batch
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BLOCKCHAIN_PRIVATE_KEY: ee8e8c36ec6bd55bd7206ca85598c52d5dac74695c45a94afc813b5e8a885a8f
      BLOCKCHAIN_RPC_URL: https://eth-sepolia.g.alchemy.com/...
      BLOCKCHAIN_CONTRACT_ADDRESS: ""
    depends_on:
      - db
      - redis
#F/E 컨테이너
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/stone/app:/srv/stone/app
    depends_on:
      - main

#젠킨스 컨테이너
  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    restart: always
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/stone/app:/srv/stone/app
    user: root

volumes:
  postgres_data:
  jenkins_data:

