services:
  db:
    image: postgres:18
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.2'
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.1'
  main:
    build: ./main
    container_name: app-main
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /srv/stone/app/files:/app/files
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
      BLOCKCHAIN_CONTRACT_ADDRESS: ${BLOCKCHAIN_CONTRACT_ADDRESS}
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '0.3'
  match:
    build: ./match
    container_name: app-match
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
      BLOCKCHAIN_CONTRACT_ADDRESS: ${BLOCKCHAIN_CONTRACT_ADDRESS_MATCH}
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 1.5g
          cpus: '0.2'
  batch:
    build: ./batch
    container_name: app-batch
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BLOCKCHAIN_PRIVATE_KEY: ${BLOCKCHAIN_PRIVATE_KEY}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
      BLOCKCHAIN_CONTRACT_ADDRESS: ${BLOCKCHAIN_CONTRACT_ADDRESS_BATCH}
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.1'
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/stone/app:/srv/stone/app
    depends_on:
      - main
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.1'
volumes:
  postgres_data: