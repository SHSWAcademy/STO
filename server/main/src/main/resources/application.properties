#DB  properties

# main  8080, match 8081, batch 8082
server.port=8081

# WebSocket CORS (Local Host)
localhost=http://localhost:3000

match.server.url=http://localhost:8081

spring.datasource.url=jdbc:postgresql://192.168.0.159:5432/postgres
#spring.datasource.url=jdbc:postgresql://192.168.0.159:5432/postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=qjarms98#


spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true


logging.level.org.hibernate.orm.jdbc.bind=TRACE

# MyBatis XML
mybatis.mapper-locations=classpath:mapper/**/*.xml
# MyBatis snake -> camel
mybatis.configuration.map-underscore-to-camel-case=true

spring.data.redis.host=localhost
spring.data.redis.port=6379


# JWT
jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration=3600000

springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.api-docs.path=/api-docs/json

file.path= z:/

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Blockchain
blockchain.issuer-private-key=${BLOCKCHAIN_PRIVATE_KEY:}
blockchain.wallet-encryption-key=${BLOCKCHAIN_WALLET_ENCRYPTION_KEY:}
blockchain.rpc-url=${BLOCKCHAIN_RPC_URL:}
